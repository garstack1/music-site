name: Ticketmaster Import

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Import IE Concerts
        run: |
          curl -s -L -X POST "${{ secrets.SITE_URL }}/api/cron/ticketmaster-category" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"category": "ie_concerts"}'
          echo ""
          
      - name: Import GB Concerts
        run: |
          curl -s -L -X POST "${{ secrets.SITE_URL }}/api/cron/ticketmaster-category" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"category": "gb_concerts"}'
          echo ""

      - name: Import IE Comedy
        run: |
          curl -s -L -X POST "${{ secrets.SITE_URL }}/api/cron/ticketmaster-category" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"category": "ie_comedy"}'
          echo ""

      - name: Import GB Comedy
        run: |
          curl -s -L -X POST "${{ secrets.SITE_URL }}/api/cron/ticketmaster-category" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"category": "gb_comedy"}'
          echo ""

      - name: Import EU Festivals
        run: |
          countries="ie gb es fr de nl pt be it at ch dk se no fi pl cz hu hr gr ro bg sk si lt lv ee"
          for country in $countries; do
            echo "Importing festivals_$country..."
            curl -s -L -X POST "${{ secrets.SITE_URL }}/api/cron/ticketmaster-category" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -d "{\"category\": \"festivals_$country\"}"
            echo ""
            sleep 2
          done
          echo "All festivals imported"
